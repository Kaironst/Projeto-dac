version: "3.9"

services:
  users-database:
    image: postgres
    container_name: users-database
    ports:
      - "1501:1501"

    environment:
      POSTGRES_DB: web2database
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: admin
      PGDATA: /var/lib/postgresql/data

    volumes:
      - pgdata:/var/lib/postgresql/data

  webpage-service:
    build:
      context: ..
      dockerfile: docker/spring-boot-service.dockerfile
      args:
        JAR_FILE: ./webpageService/build/libs/webpageService-0.0.1-SNAPSHOT.jar
    ports:
      - "8080:8080"

  users-service:
    build:
      context: ..
      dockerfile: docker/spring-boot-service.dockerfile
      args:
        JAR_FILE: ./usersService/build/libs/usersService-0.0.1-SNAPSHOT.jar
    ports:
      - "8081:8080"

volumes:
  pgdata:
