services:
  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" #porta para o webapp de gerenciamento
    environment:
      RABBITMQ_DEFAULT_USER: usuario
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  users-database:
    image: postgres
    container_name: users-database
    ports:
      - "1501:5432"

    environment:
      POSTGRES_DB: users_database
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: admin
      PGDATA: /var/lib/postgresql/data

    volumes:
      - pgdata:/var/lib/postgresql/data

  webpage-service:
    build:
      context: ..
      dockerfile: docker/spring-boot-service.dockerfile
      args:
        JAR_FILE: ./webpageService/build/libs/webpageService-0.0.1-SNAPSHOT.jar
    ports:
      - "8080:8080"

  orchestrator-service:
    build:
      context: ..
      dockerfile: docker/spring-boot-service.dockerfile
      args:
        JAR_FILE: ./orchestratorService/build/libs/orchestratorService-0.0.1-SNAPSHOT.jar
    ports:
      - "8082:8080"

  users-service:
    build:
      context: ..
      dockerfile: docker/spring-boot-service.dockerfile
      args:
        JAR_FILE: ./usersService/build/libs/usersService-0.0.1-SNAPSHOT.jar
    ports:
      - "8083:8080"

volumes:
  pgdata:
  rabbitmq_data:
