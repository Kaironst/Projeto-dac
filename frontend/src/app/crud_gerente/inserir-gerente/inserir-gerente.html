<form method="POST" [formGroup]="formGroup" (ngSubmit)="inserir()" class="inserir-gerente-form">
  <mat-card class="inserir-gerente-card" appearance="outlined">

    <mat-card-header class="card-header">
      <mat-card-title class="inserir-gerente-title">Inserir Gerente</mat-card-title>
    </mat-card-header>

    <mat-card-content class="card-content">
      
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input type="text" matInput formControlName="nome" placeholder="Nome completo">
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>CPF</mat-label>
          <input type="text" matInput formControlName="cpf" placeholder="000.000.000-00" mask="999.999.999-99" ngxMask>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input type="email" matInput formControlName="email" placeholder="cliente@bantads.com">
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Telefone</mat-label>
          <input type="text" matInput formControlName="telefone" placeholder="(00) 00000-0000" mask="(99) 99999-9999" ngxMask>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input type="password" matInput formControlName="senha" placeholder="Sua senha">
        </mat-form-field>
      </div>

    </mat-card-content>

    <mat-card-actions class="card-actions">
      <button type="submit" mat-flat-button color="primary" class="submit-button" [disabled]="!formGroup.valid">Inserir Gerente</button>
      <button type="button" mat-button color="warn" class="voltar-button" (click)="voltar()">Voltar</button>
    </mat-card-actions>

  </mat-card>
</form>
