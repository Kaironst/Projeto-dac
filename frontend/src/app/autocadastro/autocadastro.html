<form method="POST" [formGroup]="formGroup" (ngSubmit)="cadastrar()" class="cadastro-form">
  <mat-card class="cadastro-card" appearance="outlined">

    <mat-card-header class="card-header">
      <mat-card-title class="cadastro-title">Autocadastro de Cliente</mat-card-title>
    </mat-card-header>

    <mat-card-content class="card-content">

      <div class="form-row">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome Completo</mat-label>
          <input matInput formControlName="nome" placeholder="Seu nome completo">
        </mat-form-field>
      </div>

      <div class="form-row two-cols">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input type="email" matInput formControlName="email" placeholder="cliente@bantads.com">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>CPF</mat-label>
          <input matInput formControlName="cpf" placeholder="000.000.000-00" mask="999.999.999-99">
        </mat-form-field>
      </div>

      <div class="form-row two-cols">
        <mat-form-field appearance="outline">
          <mat-label>Telefone</mat-label>
          <input matInput formControlName="telefone" placeholder="(00) 00000-0000" mask="(99) 99999-9999">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Salário</mat-label>
          <input type="number" matInput formControlName="salario" placeholder="0000,00">
        </mat-form-field>
      </div>

      <h3 class="section-subtitle">Endereço</h3>

      <div class="form-row two-cols-cep">
        <mat-form-field appearance="outline">
          <mat-label>CEP</mat-label>
          <input matInput formControlName="cep" mask="00000-000" placeholder="00000-000">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Logradouro</mat-label>
          <input matInput formControlName="logradouro" placeholder="Rua, Avenida, etc.">
        </mat-form-field>
      </div>

      <div class="form-row three-cols">
        <mat-form-field appearance="outline">
          <mat-label>Número</mat-label>
          <input matInput formControlName="numero" placeholder="123">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Complemento</mat-label>
          <input matInput formControlName="complemento" placeholder="Apto 1">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Cidade</mat-label>
          <input matInput formControlName="cidade" placeholder="Curitiba">
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Estado</mat-label>
          <input matInput formControlName="estado" placeholder="PR">
        </mat-form-field>
      </div>

    </mat-card-content>

    <mat-card-actions class="card-actions">
      <button type="submit" mat-flat-button color="primary" class="submit-button" [disabled]="!formGroup.valid">Concluir Cadastro</button>
      <button type="button" mat-button color="warn" class="voltar-button" (click)="voltar()">Voltar</button>
    </mat-card-actions>

  </mat-card>
</form>

@if (mostrarMensagemSucesso) {
  <div class="success-backdrop" (click)="fecharMensagemSucesso()">
    <mat-card class="success-card" appearance="outlined" (click)="$event.stopPropagation()">
      <mat-card-content class="success-content">
        <h2>Autocadastro realizado com sucesso</h2>
        <p>Seu cadastro foi enviado. Você será direcionado para a tela inicial.</p>
      </mat-card-content>

      <mat-card-actions class="success-actions">
        <button type="button" mat-flat-button color="primary" (click)="fecharMensagemSucesso()">OK</button>
      </mat-card-actions>
    </mat-card>
  </div>
}
