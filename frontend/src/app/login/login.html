<form method="POST" [formGroup]="formGroup" (ngSubmit)="login()" class="login-form">
  <mat-card class="login-card" appearance="outlined">

    <mat-card-header class="card-header">
      <mat-card-title class="login-title">Login</mat-card-title>
    </mat-card-header>

    <mat-card-content class="card-content">

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input type="email" matInput formControlName="email" placeholder="cliente@bantads.com">
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input type="password" matInput formControlName="senha" placeholder="Sua senha">
        </mat-form-field>
      </div>

    </mat-card-content>

    <mat-card-actions class="card-actions">
      <button type="submit" mat-flat-button color="primary" class="submit-button" [disabled]="!formGroup.valid">Realizar Login</button>
      <button type="button" mat-button color="warn" class="voltar-button" (click)="voltar()">Voltar</button>
    </mat-card-actions>

  </mat-card>
</form>
