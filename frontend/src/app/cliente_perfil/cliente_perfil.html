<div class="container">
  <header>
    <h1>Tela do Cliente</h1>
  </header>

  <form [formGroup]="perfilForm" (ngSubmit)="atualizarPerfil()">

    <div class="card">
      <h2>Perfil do Cliente</h2>

      <div class="form-row">
        <label>Número de Conta:</label>
        <input type="text" [value]="numConta" disabled />
      </div>

      <div class="form-row">
        <label>Nome:</label>
        <input type="text" formControlName="nome" />
      </div>

      <div class="form-row">
        <label>Email:</label>
        <input type="text" formControlName="email" />
      </div>

      <div class="form-row">
        <label>Telefone:</label>
        <input type="text" formControlName="telefone" mask="(99) 99999-9999" />
      </div>

      <div class="form-row">
        <label>CPF:</label>
        <input type="text" [value]="cpf" disabled />
      </div>

      <div class="form-row">
        <label>Salário:</label>
        <input type="number" formControlName="salario" />
      </div>

      <div class="form-row">
        <label>Gerente:</label>
        <input type="text" [value]="gerente" disabled />
      </div>

      <h3>Endereço</h3>

      <div class="form-row">
        <label>CEP:</label>
        <input type="text" formControlName="cep" mask="00000-000" />
      </div>

      <div class="form-row">
        <label>Logradouro:</label>
        <input type="text" formControlName="logradouro" />
      </div>

      <div class="form-row">
        <label>Número:</label>
        <input type="text" formControlName="numero" />
      </div>

      <div class="form-row">
        <label>Complemento:</label>
        <input type="text" formControlName="complemento" />
      </div>

      <div class="form-row">
        <label>Cidade:</label>
        <input type="text" formControlName="cidade" />
      </div>

      <div class="form-row">
        <label>Estado:</label>
        <input type="text" formControlName="estado" />
      </div>

      <button type="submit">Atualizar Perfil</button>
    </div>

  </form>
</div>
