@if (aberto) {
  <div class="modal-backdrop" (click)="cancelar()">
    <mat-card class="modal-card" appearance="outlined" (click)="impedirFechamento($event)">
      <mat-card-header class="card-header">
        <mat-card-title class="modal-title">{{ titulo }}</mat-card-title>
      </mat-card-header>

      <form class="gerente-form" [formGroup]="formGroup" (ngSubmit)="salvar()">
        <mat-card-content class="card-content">
          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Nome</mat-label>
              <input matInput formControlName="nome" placeholder="Nome completo" />
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline" floatLabel="always">
              <mat-label>CPF</mat-label>
              <input
                matInput
                formControlName="cpf"
                [readonly]="modo === 'editar'"
                placeholder="000.000.000-00"
                mask="999.999.999-99"
                ngxMask
              />
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>E-mail</mat-label>
              <input matInput type="email" formControlName="email" placeholder="gerente@bantads.com" />
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline" floatLabel="always">
              <mat-label>Telefone</mat-label>
              <input
                matInput
                formControlName="telefone"
                [readonly]="modo === 'editar'"
                placeholder="(00) 00000-0000"
                mask="(99) 99999-9999"
                ngxMask
              />
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Senha</mat-label>
              <input
                matInput
                [type]="esconderSenha ? 'password' : 'text'"
                formControlName="senha"
                [placeholder]="modo === 'editar' ? 'Alterar senha (opcional)' : 'Sua senha'"
              />
              <button
                mat-icon-button
                matSuffix
                type="button"
                [attr.aria-label]="esconderSenha ? 'Mostrar senha' : 'Ocultar senha'"
                (click)="alternarVisibilidadeSenha()"
              >
                <span class="material-icons">{{ esconderSenha ? 'visibility' : 'visibility_off' }}</span>
              </button>
            </mat-form-field>
          </div>
        </mat-card-content>

        <mat-card-actions class="card-actions">
          <button mat-button type="button" (click)="cancelar()">Cancelar</button>
          <button mat-flat-button color="primary" type="submit" [disabled]="formGroup.invalid">{{ textoSalvar }}</button>
        </mat-card-actions>
      </form>
    </mat-card>
  </div>
}
