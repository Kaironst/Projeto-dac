@if (aberto) {
  <div class="modal-backdrop" (click)="cancelar()">
    <mat-card class="modal-card" appearance="outlined" (click)="impedirFechamento($event)">
      <mat-card-header class="card-header">
        <mat-card-title class="modal-title">Adicionar Gerente</mat-card-title>
      </mat-card-header>

      <form class="gerente-form" [formGroup]="formGroup" (ngSubmit)="salvar()">
        <mat-card-content class="card-content">
          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Nome</mat-label>
              <input matInput formControlName="nome" placeholder="Nome completo" />
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>CPF</mat-label>
              <input matInput formControlName="cpf" placeholder="000.000.000-00" mask="999.999.999-99" ngxMask />
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>E-mail</mat-label>
              <input matInput type="email" formControlName="email" placeholder="gerente@bantads.com" />
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Telefone</mat-label>
              <input matInput formControlName="telefone" placeholder="(00) 00000-0000" mask="(99) 99999-9999" ngxMask />
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Senha</mat-label>
              <input matInput type="password" formControlName="senha" placeholder="Sua senha" />
            </mat-form-field>
          </div>
        </mat-card-content>

        <mat-card-actions class="card-actions">
          <button mat-button type="button" (click)="cancelar()">Cancelar</button>
          <button mat-flat-button color="primary" type="submit" [disabled]="formGroup.invalid">Salvar gerente</button>
        </mat-card-actions>
      </form>
    </mat-card>
  </div>
}
