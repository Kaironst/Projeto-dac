@if (aberto) {
  <div class="modal-backdrop" (click)="onCancelar()">
    <mat-card class="modal-card" appearance="outlined" (click)="impedirFechamento($event)">
      <mat-card-header class="card-header">
        <mat-card-title class="modal-title">Remover Gerente</mat-card-title>
      </mat-card-header>

      <mat-card-content class="card-content">
        <p>
          Tem certeza que deseja remover o gerente <strong>{{ gerenteNome }}</strong>?
        </p>
      </mat-card-content>

      <mat-card-actions class="card-actions">
        <button mat-button type="button" (click)="onCancelar()">Cancelar</button>
        <button mat-flat-button color="warn" type="button" (click)="onConfirmar()">Remover</button>
      </mat-card-actions>
    </mat-card>
  </div>
}
